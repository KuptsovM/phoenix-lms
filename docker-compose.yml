services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: phoenix-lms-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - app_vendor:/var/www/html/vendor
    networks:
      - phoenix-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=phoenix_lms
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_ENV=local
      - APP_DEBUG=true
    healthcheck:
      test: ["CMD-SHELL", "php -r \"exit((int)!@fsockopen('127.0.0.1', 9000));\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 300s

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: phoenix-lms-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - phoenix-network
    depends_on:
      app:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: phoenix-lms-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: phoenix_lms
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - phoenix-network
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - phoenix-network

volumes:
  db_data:
  app_vendor:

networks:
  phoenix-network:
    driver: bridge

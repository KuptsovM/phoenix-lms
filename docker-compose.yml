version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: phoenix-lms-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    networks:
      - phoenix-network
    depends_on:
      - db
      - redis
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=phoenix_lms
      - DB_USERNAME=root
      - DB_PASSWORD=secret

  web:
    image: nginx:alpine
    container_name: phoenix-lms-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/html/public
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - phoenix-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: phoenix-lms-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: phoenix_lms
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - phoenix-network
    ports:
      - "3307:3306"

  redis:
    image: redis:alpine
    restart: unless-stopped
    networks:
      - phoenix-network

volumes:
  db_data:

networks:
  phoenix-network:
    driver: bridge